name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run backend tests
        run: |
          python backend/test_api.py
      - name: Check Python syntax
        run: |
          python -m py_compile backend/server.py
          python -m py_compile backend/database.py
          python -m py_compile backend/trip_planner.py

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /opt
            if [ -d china-travel-map ]; then
              cd china-travel-map && git pull
            else
              git clone https://github.com/caofeng926/china-travel-map.git
              cd china-travel-map
            fi
            pkill -f "python3.*server.py" 2>/dev/null || true
            nohup python3 backend/server.py > server.log 2>&1 &
            echo "Deployed!"
