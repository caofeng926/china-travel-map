name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run backend tests
        run: |
          python -m py_compile backend/test_api.py
          python backend/test_api.py -v
      - name: Check Python syntax
        run: |
          python -m py_compile backend/server.py
          python -m py_compile backend/database.py
          python -m py_compile backend/trip_planner.py

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            export AMAP_KEY="${{ secrets.AMAP_KEY }}"
            cd /opt/china-travel-map 2>/dev/null || { mkdir -p /opt && git clone https://github.com/caofeng926/china-travel-map.git /opt/china-travel-map && cd /opt/china-travel-map; }
            echo "Pulling latest code..."
            timeout 30 git pull || echo "git pull skipped (network issue), using current code"
            echo "Restarting server..."
            pkill -f "python3.*server.py" 2>/dev/null || true
            sleep 1
            cd backend
            nohup python3 server.py > ../server.log 2>&1 &
            sleep 2
            curl -s --connect-timeout 5 http://127.0.0.1:8765/api/health && echo "Health OK" || echo "Health check failed, check server.log"
            echo "Deployed!"