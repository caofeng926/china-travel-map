# China Travel Map - Nginx Reverse Proxy Configuration
# Place in: /etc/nginx/sites-available/china-travel-map
# Then: ln -s /etc/nginx/sites-available/china-travel-map /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

# --- Rate limiting zone (shared across all servers) ---
limit_req_zone $binary_remote_addr zone=travel_map:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_travel:10m;

server {
    listen 80;
    server_name vps5865.top;  # TODO: Replace with your actual domain
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vps5865.top;  # TODO: Replace with your actual domain

    # --- SSL (use certbot / Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/vps5865.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps5865.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # --- Static files (frontend) ---
    root /opt/china-travel-map/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # --- API proxy ---
    location /api/ {
        # Rate limiting
        limit_req zone=travel_map burst=20 nodelay;
        limit_conn conn_travel 10;

        # Proxy to Python backend
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;

        # Body size limit
        client_max_body_size 1m;

        # CORS (restricted to this site)
        add_header Access-Control-Allow-Origin $scheme://$host always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age 86400 always;

        # No caching for API
        add_header Cache-Control "no-store" always;
    }

    # --- Deny access to sensitive files ---
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ /(\.env|\.git|push_to_github|socks_proxy|start_srv) {
        deny all;
        return 404;
    }

    # --- Logs ---
    access_log /var/log/nginx/china-travel-map.access.log;
    error_log  /var/log/nginx/china-travel-map.error.log;
}