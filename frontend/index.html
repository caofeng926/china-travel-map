<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>中国旅游地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* Loading overlay */
#pl{position:absolute;z-index:2000;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center}
#pl .loading{text-align:center;font-size:14px;color:#666}
#pl .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#c0392b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#pl .retry-btn{margin-top:12px;padding:8px 20px;background:#c0392b;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
#pl .progress-bar-wrap{margin-top:10px;width:200px;height:4px;background:#eee;border-radius:2px;overflow:hidden}
#pl .progress-bar{height:100%;background:#c0392b;width:0;transition:width .3s}
#pl .progress-text{margin-top:6px;font-size:12px;color:#999}\n
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#map{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1}
#locateBtn:hover{background:#f0f0f0}

/* ===== Desktop Panel ===== */
#panel{position:absolute;z-index:1000;background:rgba(255,255,255,.97);box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden}
#panel h2{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;margin:0;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
#panel h2 .ti{font-size:15px;white-space:nowrap}
#panel h2 .sm{font-size:10px;opacity:.8;font-weight:normal}
#panel h2 .tg{font-size:12px;opacity:.7;display:none}

#modeSwitch{display:flex;border-bottom:1px solid #e0e0e0}
#modeSwitch button{flex:1;padding:6px;border:none;background:#f0f0f0;cursor:pointer;font-size:12px;color:#666;transition:all .2s}
#modeSwitch button.active{background:#c0392b;color:#fff;font-weight:700}
#modeSwitch button:first-child{border-right:1px solid #ddd}

#stats{display:flex;gap:4px;padding:8px 10px}
#stats>div{flex:1;text-align:center;background:#f5f5f5;border-radius:6px;padding:4px 0}
#stats .n{font-size:18px;font-weight:700;color:#c0392b}
#stats .l{font-size:10px;color:#888}
#filters{padding:0 10px 6px;display:flex;gap:3px;flex-wrap:wrap}
#filters button{padding:3px 8px;border:none;border-radius:4px;font-size:10px;cursor:pointer;background:#eee;color:#666;font-weight:600;touch-action:manipulation}
#filters button.active{background:#c0392b;color:#fff}
#search{margin:0 10px 8px}
#search input{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:11px;outline:none}
#list{flex:1;overflow-y:auto;padding:0 10px 10px}
#list .item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;cursor:pointer;border:1px solid #eee;margin-bottom:2px;font-size:11px;touch-action:manipulation}
#list .item:hover{background:#fdf2f0}
#list .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#list .dot.s{background:#e74c3c}#list .dot.f{background:#f39c12}#list .dot.l{background:#9b59b6}
#list .info{flex:1;min-width:0}
#list .name{font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#list .sub{font-size:10px;color:#999}
#list .tag{font-size:9px;padding:1px 5px;border-radius:8px;flex-shrink:0}
#list .tag.s{background:#fde8e6;color:#c0392b}#list .tag.f{background:#fef3e0;color:#e67e22}#list .tag.l{background:#f0e8ff;color:#9b59b6}
#list .tag.w{background:#e6f7f0;color:#27ae60}#list .tag.r{background:#e8f4fd;color:#2980b9}
#status{padding:8px 10px;font-size:11px;color:#999;text-align:center}

/* Desktop layout */
@media(min-width:768px){
  #panel{top:12px;left:12px;width:320px;max-height:calc(100vh - 24px);border-radius:12px}
  #panel h2{padding:10px 14px;border-radius:12px 12px 0 0}
  #list{max-height:350px}
}

/* Mobile layout */
@media(max-width:767px){
  #panel{bottom:0;left:0;right:0;border-radius:12px 12px 0 0;max-height:85vh;transition:transform .3s ease}
  #panel.collapsed{transform:translateY(calc(100% - 52px))}
  #panel h2{padding:8px 14px;border-radius:12px 12px 0 0}
  #panel h2 .tg{display:block;font-size:16px}
  .handle-bar{width:36px;height:4px;background:#ddd;border-radius:2px;margin:6px auto 0;display:block}
  #stats{padding:6px 8px;gap:3px}
  #stats>div{padding:3px 0}
  #stats .n{font-size:15px}
  #stats .l{font-size:9px}
  #filters{padding:0 6px 4px;gap:2px}
  #filters button{padding:4px 6px;font-size:9px;min-height:28px}
  #search{margin:0 6px 6px}
  #list{max-height:40vh}
  #list .item{padding:6px 6px;font-size:12px}
  #panel.collapsed #filters,#panel.collapsed #search,#panel.collapsed #list{display:none}
  #panel.collapsed #stats{padding:4px 8px}
  #panel.collapsed #stats .n{font-size:14px}
}

/* Manual locate button (fallback) */
#locateBtn{position:absolute;z-index:999;width:44px;height:44px;border-radius:50%;background:#fff;color:#333;border:2px solid #ddd;font-size:20px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);touch-action:manipulation;display:flex;align-items:center;justify-content:center}
@media(min-width:768px){#locateBtn{bottom:140px;right:12px}}
@media(max-width:767px){#locateBtn{bottom:170px;right:12px}}

/* Floating toggle for mobile */
#toggleBtn{position:absolute;z-index:999;display:none;width:44px;height:44px;border-radius:50%;background:#c0392b;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.3);touch-action:manipulation}
@media(max-width:767px){
  #toggleBtn{display:block;bottom:60px;right:12px}
}
</style>
</head>
<body>
<div id="map"></div>
<div id="pl"><div class="loading"><div class="spinner"></div>正在加载中国旅游地图...</div></div>
<button id="toggleBtn" onclick="togglePanel()">☰</button>
<button id="locateBtn" onclick="doLocate()">📍</button>
<div id="panel">
  <div class="handle-bar"></div>
  <h2><span class="ti">中国旅游地图 <span class="sm">7,000+ POI</span></span><span class="tg" id="toggleArrow">▲</span></h2>
  <div id="modeSwitch"><button class="mode-btn active" data-mode="browse">浏览</button><button class="mode-btn" data-mode="plan">行程规划</button></div>
<div id="tripForm" style="display:none;padding:6px 10px;border-bottom:1px solid #e0e0e0;background:#f8f9fa;font-size:12px">
  <div style="display:flex;gap:4px;margin-bottom:4px">
    <input id="tripOrigin" placeholder="出发地（城市名）" style="flex:1;padding:4px 6px;border:1px solid #ccc;border-radius:3px;font-size:12px">
    <input id="tripDest" placeholder="目的地" style="flex:1;padding:4px 6px;border:1px solid #ccc;border-radius:3px;font-size:12px">
  </div>
  <div style="display:flex;gap:4px;align-items:center">
    <select id="tripMode" style="padding:4px;border:1px solid #ccc;border-radius:3px;font-size:12px">
      <option value="driving">自驾</option>
      <option value="transit">公共交通</option>
    </select>
    <button id="tripBtn" style="padding:4px 12px;background:#c0392b;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px">规划行程</button>
    <span id="tripStatus" style="color:#888;font-size:11px;margin-left:4px"></span>
  </div>
</div><div id="stats">
    <div><div class="n" id="stotal">0</div><div class="l">总</div></div>
    <div><div class="n" id="sscenic">0</div><div class="l">景区</div></div>
    <div><div class="n" id="sfood">0</div><div class="l">美食</div></div>
    <div><div class="n" id="sleisure">0</div><div class="l">街区</div></div>
  </div>
  <div id="filters">
    <button class="active" data-type="all">全部</button>
    <button data-type="5A">5A</button><button data-type="4A">4A</button><button data-type="3A">3A</button>
    <button data-type="leisure">街区</button><button data-type="world">世界</button>
    <button data-type="resort">度假</button><button data-type="food">美食</button>
  </div>
  <div id="search"><input type="text" id="kw" placeholder="搜索景点名称或城市..."></div>
  <div id="list"><div id="status">加载中...</div></div>
</div>
<script>
var stEl=document.getElementById("status");
var API_BASE = location.origin + location.pathname.replace(/\/index\.html$/, "").replace(/\/$/, "");
function status(m){stEl.textContent=m;console.log(m)}

function hidePL(){
  var el=document.getElementById("pl");
  if(el){el.style.display="none"}
}


function fetchRetry(url, retries, delay){
  return fetch(url).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r;
  }).catch(function(e){
    if(retries <= 1) throw e;
    return new Promise(function(resolve){
      setTimeout(resolve, delay);
    }).then(function(){
      return fetchRetry(url, retries-1, delay*2);
    });
  });
}

window._AMapSecurityConfig={securityJsCode:"e9222e15bcfca7750536ca497e767bda"};window.AMapSecurityConfig=window._AMapSecurityConfig;
var AMAP_KEY="38fba823c8d8df93203578dfbfb14cd2";
var map=null,allPois=[],allStats=null,currentFilter="all",isTripMode=false,mapInitialized=false;
var userPosition=null;
function getDistance(lat1,lng1,lat2,lng2){
  var R=6371000;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLng/2)*Math.sin(dLng/2);
  var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  var d=R*c;
  if(d<1000)return Math.round(d)+"m";
  return (d/1000).toFixed(1)+"km";
}

// Mobile panel
var panel=document.getElementById("panel");
function isMobile() { return window.innerWidth < 768; }
function isPortrait() { return window.innerHeight > window.innerWidth; }

function togglePanel(){
  panel.classList.toggle("collapsed");
  document.getElementById("toggleArrow").textContent=panel.classList.contains("collapsed")?"▼":"▲";
}
// Desktop: panel always expanded; mobile: collapsed by default
if(isMobile()){
  panel.classList.add("collapsed");
}
document.querySelector("#panel h2").onclick=togglePanel;

var amapLoadTimeout = null;
var amapLoadFailed = false;

function showRetryBtn(msg) {
  var el = document.getElementById("pl");
  if (!el) return;
  el.innerHTML = '<div class="loading"><div style="font-size:14px;color:#c0392b;margin-bottom:8px">' + (msg || "地图加载超时") + '</div><div style="font-size:12px;color:#888;margin-bottom:12px">请检查网络后重试</div><button class="retry-btn" onclick="retryLoad()">重新加载</button></div>';
}

function retryLoad() {
  // Remove old script if exists
  var old = document.getElementById("_amap_script");
  if (old) old.parentNode.removeChild(old);
  // Clear global state
  window._onAmapLoad = function(){status("加载地图...");createMap()};
  mapInitialized = false;
  amapLoadFailed = false;
  if (amapLoadTimeout) clearTimeout(amapLoadTimeout);
  loadAmapJS();
}

function loadAmapJS() {
  var el = document.getElementById("pl");
  if (el) el.innerHTML = '<div class="loading"><div class="spinner"></div>正在加载地图...</div>';
  var s = document.createElement("script");
  s.id = "_amap_script";
  s.src = "https://webapi.amap.com/maps?v=2.0&key=" + AMAP_KEY + "&callback=_onAmapLoad&t=" + Date.now();
  s.onerror = function() {
    amapLoadFailed = true;
    showRetryBtn("高德地图加载失败");
  };
  document.head.appendChild(s);
  status("加载高德地图SDK...");
  // 15s timeout fallback
  if (amapLoadTimeout) clearTimeout(amapLoadTimeout);
  amapLoadTimeout = setTimeout(function() {
    if (!mapInitialized && !amapLoadFailed) {
      showRetryBtn("地图加载超时（网络较慢）");
    }
  }, 15000);
}

window._onAmapLoad = function() {
  if (mapInitialized) return;
  mapInitialized = true;
  if (amapLoadTimeout) clearTimeout(amapLoadTimeout);
  status("加载地图...");createMap();
};
loadAmapJS();

function createMap(){
  try{
    map=new AMap.Map("map",{center:[109.5,36.5],zoom:5,mapStyle:"amap://styles/light"});
    hidePL();
    status("地图OK，加载数据...");
  // 添加定位控件
  // Skip auto-locate on HTTP (geolocation requires HTTPS)
  // Use IP-based geolocation as fallback - works on HTTP
  fetch('https://restapi.amap.com/v3/ip?key=' + AMAP_KEY)
    .then(function(r){return r.json()})
    .then(function(data){
      if(data && data.status === "1" && data.rectangle) {
        var rect = data.rectangle.split(";");
        if(rect.length === 2) {
          var lng1 = parseFloat(rect[0].split(",")[0]);
          var lat1 = parseFloat(rect[0].split(",")[1]);
          var lng2 = parseFloat(rect[1].split(",")[0]);
          var lat2 = parseFloat(rect[1].split(",")[1]);
          var centerLng = (lng1 + lng2) / 2;
          var centerLat = (lat1 + lat2) / 2;
          userPosition = {lat: centerLat, lng: centerLng, fromIP: true, province: data.province, city: data.city};
          console.log("IP定位成功:", data.province, data.city);
        }
      }
    }).catch(function(e){console.log("IP定位失败:", e);});

    // Show loading progress
    var el = document.getElementById("pl");
    if (el) el.innerHTML = '<div class="loading"><div class="spinner"></div><div id="loadProgress">正在加载数据...</div><div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div><div class="progress-text" id="progressText">0%</div></div>';

    loadPOIData();
  }catch(e){status("地图错误: "+e.message)}
}

var massMarksLayer = null;
var allPoisFull = null;

function loadPOIData() {
  var pageSize = isMobile() ? 2000 : 4000;
  fetch(API_BASE + "/api/pois?compact=0&page_size=" + pageSize)
    .then(function(r){ if(!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(function(d){
      allPois = d.results || [];
      allPoisFull = allPois;
      var total = d.total || allPois.length;
      status("加载了 " + allPois.length + " 个POI（共" + total + "）");
      setupUI(); updateStats(allPois); renderList(allPois.slice(0, 100));
      renderMassMarks(allPois);
      hidePL();
    })
    .catch(function(e){
      showRetryBtn("数据加载失败: " + e.message);
    });
}

      { url: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiIGZpbGw9IiNmMzljMTIiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSIyIi8+PHRleHQgeD0iMTIiIHk9IjE1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjkiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjZmZmIiBmb250LWZhbWlseT0iQXJpYWwiPkY8L3RleHQ+PC9zdmc+", anchor: new AMap.Pixel(12, 12), size: new AMap.Size(24, 24) },

      style: styles,

        phone: p.phone,
        description: p.description

    massMarksLayer.setData(massData);
    massMarksLayer.setMap(map);

    // Click on mass mark to show info
    massMarksLayer.on("click", function(e) {
      var info = e.data;
      if (!info || !info.name) return;

      if(info.address) c += '<div style="font-size:12px;color:#555;margin-bottom:4px;line-height:1.5">&#128205; ' + esc(info.address) + '</div>';
      if(info.province || info.city) c += '<div style="font-size:11px;color:#999;margin-bottom:4px">' + esc((info.province||"") + " " + (info.city||"")) + '</div>';
      if(info.phone) c += '<div style="font-size:12px;color:#2980b9;margin-top:6px">&#128222; <a href="tel:' + info.phone.replace(/[^0-9+\-]/g, "") + '" style="color:#2980b9;text-decoration:none">' + esc(info.phone) + '</a></div>';
      if(info.description) c += '<div style="font-size:11px;color:#7f8c8d;margin-top:6px;padding-top:6px;border-top:1px solid #eee">' + esc(info.description) + '</div>';
      c += '</div>';
      if (lnglat) {
        map.setCenter(lnglat);
        new AMap.InfoWindow({ content: c, offset: new AMap.Pixel(0, -20) }).open(map, lnglat);
      }
    });

    status("显示了 " + pois.length + " 个标记（海量点模式）");
  });
}

function iconStyle(p){
  if(p.type==="food")return{color:"#f39c12",label:"食",cls:"f",size:24};
  if(p.rating==="世界遗产")return{color:"#27ae60",label:"世",cls:"w",size:28};
  if(p.rating==="国家级旅游度假区")return{color:"#2980b9",label:"度",cls:"r",size:24};
  if(p.rating&&p.rating.indexOf("滑雪")>=0)return{color:"#3498db",label:"雪",cls:"s",size:24};
  if(p.rating&&p.rating.indexOf("街区")>=0)return{color:"#9b59b6",label:"街",cls:"l",size:24};
  var rt=p.rating||"";
  if(rt.indexOf("5A")>=0)return{color:"#c0392b",label:"5A",cls:"s",size:30};
  if(rt.indexOf("4A")>=0)return{color:"#e74c3c",label:"4A",cls:"s",size:26};
  if(rt.indexOf("3A")>=0)return{color:"#e67e22",label:"3A",cls:"s",size:24};
  return{color:"#95a5a6",label:"●",cls:"s",size:20};
}


function updateClusterer(pois){
  if(isTripMode||!map){return}
  var list=pois||filterData();
  status("正在渲染 "+list.length+" 个标记...");
  renderMassMarks(list);
}
function filterData(){
  var arr=allPois;
  if(currentFilter==="all")return arr;
  if(currentFilter==="food")return arr.filter(function(p){return p.type==="food"});
  if(currentFilter==="leisure")return arr.filter(function(p){return p.type==="scenic"&&(!p.rating||(p.rating.indexOf("街区")>=0))});
  if(currentFilter==="world")return arr.filter(function(p){return p.rating==="世界遗产"});
  if(currentFilter==="resort")return arr.filter(function(p){return p.rating==="国家级旅游度假区"});
  return arr.filter(function(p){return p.rating===currentFilter});
}

function updateStats(arr){
  document.getElementById("stotal").textContent=arr.length;
  document.getElementById("sscenic").textContent=arr.filter(function(p){
    return p.type==="scenic"&&(!p.rating||(p.rating.indexOf("街区")<0&&p.rating.indexOf("滑雪")<0&&p.rating.indexOf("度假")<0&&p.rating!=="世界遗产"));
  }).length;
  document.getElementById("sfood").textContent=arr.filter(function(p){return p.type==="food"}).length;
  document.getElementById("sleisure").textContent=arr.filter(function(p){
    return p.rating&&(p.rating.indexOf("街区")>=0||p.rating.indexOf("滑雪")>=0||p.rating.indexOf("度假")>=0||p.rating==="世界遗产");
  }).length;
}

function renderList(arr){
  var list=document.getElementById("list"),show=arr.slice(0,100),html="";
  show.forEach(function(p){
    var cls="s";if(p.type==="food")cls="f";else if(p.rating==="世界遗产")cls="w";else if(p.rating==="国家级旅游度假区")cls="r";else if(p.rating&&p.rating.indexOf("街区")>=0)cls="l";
    var tag=p.type==="food"?"食":p.rating==="世界遗产"?"世":p.rating==="国家级旅游度假区"?"度":(p.rating||"景").replace("国家级旅游","");
    html+='<div class="item" onclick="flyTo('+p.lat+","+p.lng+')">';
    html+='<div class="dot '+cls+'"></div>';
    html+='<div class="info"><div class="name">'+esc(p.name)+'</div><div class="sub">'+esc(p.city||"")+'</div></div>';
    html+='<div class="tag '+cls+'">'+tag+'</div></div>';
  });
  if(arr.length>100)html+='<div style="text-align:center;color:#999;font-size:11px;padding:4px">... +'+(arr.length-100)+' 个</div>';
  list.innerHTML=html;
}

function esc(s){if(!s)return "";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function flyTo(lat,lng){if(map)map.setZoomAndCenter(14,[lng,lat]);if(isMobile()&&!panel.classList.contains("collapsed"))togglePanel()}

function setupUI(){
  var btns=document.querySelectorAll("#filters button");
    // Mode switch
  document.querySelectorAll(".mode-btn").forEach(function(btn){
    btn.onclick = function(){
      document.querySelectorAll(".mode-btn").forEach(function(b){ b.classList.remove("active"); });
      this.classList.add("active");
      isTripMode = this.getAttribute("data-mode") === "plan";
      document.getElementById("tripForm").style.display = isTripMode ? "block" : "none";
      document.getElementById("search").style.display = isTripMode ? "none" : "block";
      document.getElementById("filters").style.display = isTripMode ? "none" : "block";
      document.getElementById("stats").style.display = isTripMode ? "none" : "block";
      if (!isTripMode) { updateClusterer(); }
    };
  });
  document.getElementById("tripBtn").onclick = doPlanTrip;
  // ENTER key in trip inputs
  document.getElementById("tripOrigin").onkeydown = function(e){ if(e.keyCode===13) doPlanTrip(); };
  document.getElementById("tripDest").onkeydown = function(e){ if(e.keyCode===13) doPlanTrip(); };
  btns.forEach(function(btn){
    btn.onclick=function(){
      btns.forEach(function(b){b.classList.remove("active")});
      this.classList.add("active");
      var ft=this.getAttribute("data-type");
      currentFilter=ft;
      // For type-specific filters, fetch from server to get full data
      var needFetch=false,params="";
      if(ft==="food"){needFetch=true;params="type=food&page_size=2000"}
      else if(ft==="world"){needFetch=true;params="rating=%E4%B8%96%E7%95%8C%E9%81%97%E4%BA%A7&page_size=500"}
      else if(ft==="resort"){needFetch=true;params="rating=%E5%9B%BD%E5%AE%B6%E7%BA%A7%E6%97%85%E6%B8%B8%E5%BA%A6%E5%81%87%E5%8C%BA&page_size=500"}
      else if(ft==="leisure"){needFetch=false}
      if(!needFetch&&allPoisFull){allPois=allPoisFull;}if(needFetch){
        status("\u52a0\u8f7d\u4e2d...");
        fetchRetry(API_BASE+"/api/pois?"+params,3,1000)
          .then(function(r){return r.json()})
          .then(function(d){allPois=d.results||[];console.log("Loaded "+allPois.length+" for "+ft);var f=filterData();updateStats(f);renderList(f.slice(0,100));updateClusterer();})
          .catch(function(e){status("\u52a0\u8f7d\u5931\u8d25: "+e.message)});
      }else{var f=filterData();updateStats(f);renderList(f.slice(0,100));updateClusterer();
      }
    };
  });
  document.getElementById("kw").oninput=function(){
    var q=this.value.trim().toLowerCase();
    if(!q){updateClusterer();return}
    var base=filterData();
    var filtered=base.filter(function(p){return(p.name&&p.name.toLowerCase().indexOf(q)>=0)||(p.city&&p.city.toLowerCase().indexOf(q)>=0)});
    updateStats(filtered);renderList(filtered.slice(0,100));
    updateClusterer(filtered);
    status("加载: "+filtered.length+" 条结果");updateStats(filtered);renderList(filtered.slice(0,100));
    status("搜索: "+filtered.length+" 个结果");
  };
}
function doLocate(){
  function showOnMap(lat,lng,label){
    userPosition={lat:lat,lng:lng};
    if(map){
      map.setZoomAndCenter(15,[lng,lat]);
      new AMap.Marker({position:[lng,lat],content:"<div style="background:#4285f4;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.3)"></div>",offset:new AMap.Pixel(-8,-8)}).setMap(map);
    }
    status("定位成功: " + (label||"定位点"));
  }
  status("正在定位...");
  if(navigator.geolocation && window.isSecureContext){
    navigator.geolocation.getCurrentPosition(function(pos){
      showOnMap(pos.coords.latitude, pos.coords.longitude, "浏览器定位");
    },function(err){
      console.log("Browser geo failed:", err);
      doIPLocate(showOnMap);
    },{enableHighAccuracy:true,timeout:5000});
  } else {
    doIPLocate(showOnMap);
  }
}
function doIPLocate(showOnMap){
  status("使用IP定位...");
  fetch("https://restapi.amap.com/v3/ip?key=" + AMAP_KEY)
    .then(function(r){return r.json()})
    .then(function(data){
      if(data && data.status === "1" && data.rectangle){
        var rect = data.rectangle.split(";");
        var lng1 = parseFloat(rect[0].split(",")[0]);
        var lat1 = parseFloat(rect[0].split(",")[1]);
        var lng2 = parseFloat(rect[1].split(",")[0]);
        var lat2 = parseFloat(rect[1].split(",")[1]);
        var centerLng = (lng1 + lng2) / 2;
        var centerLat = (lat1 + lat2) / 2;
        showOnMap(centerLat, centerLng, (data.province||"") + " " + (data.city||""));
      } else {
        status("IP定位失败");
      }
    }).catch(function(e){
      console.log("IP geo failed:", e);
      status("定位失败，请手动选择城市");
    });
}

/* === Trip Planner === */
var tripRoute = null, tripMarkers = [];
function doPlanTrip() {
  var origin = document.getElementById("tripOrigin").value.trim();
  var dest = document.getElementById("tripDest").value.trim();
  if (!origin || !dest) { document.getElementById("tripStatus").textContent = "请填写出发地和目的地"; return; }
  var mode = document.getElementById("tripMode").value;
  document.getElementById("tripStatus").textContent = "规划中...";
  document.getElementById("tripBtn").disabled = true;
  var url = API_BASE + "/api/plan_trip?origin=" + encodeURIComponent(origin) + "&dest=" + encodeURIComponent(dest) + "&mode=" + mode;
  fetch(url).then(function(r){ return r.json(); }).then(function(d){
    document.getElementById("tripBtn").disabled = false;
    if (d.error) { document.getElementById("tripStatus").textContent = d.error; return; }
    document.getElementById("tripStatus").textContent = "找到 " + d.total_pois + " 个点，约" + d.route.duration_text;
    showTripRoute(d);
  }).catch(function(e){
    document.getElementById("tripBtn").disabled = false;
    document.getElementById("tripStatus").textContent = "请求失败，请检查网络或服务器";
  });
}
function showTripRoute(d) {
  // Clear existing route + markers
  if (tripRoute) { map.remove(tripRoute); tripRoute = null; }
  tripMarkers.forEach(function(m){ m.setMap(null); });
  tripMarkers = [];
  
  // Draw route polyline
  var points = d.route.polyline.map(function(p){ return [p[1], p[0]]; }); // [lng, lat]
  tripRoute = new AMap.Polyline({
    path: points, strokeColor: "#c0392b", strokeWeight: 4, strokeOpacity: 0.8,
    strokeStyle: "solid", lineJoin: "round"
  });
  tripRoute.setMap(map);
  
  // Fit bounds
  map.setFitView([tripRoute], false, [60, 60, 60, 60]);
  
  // Mark origin and destination
  var originMarker = new AMap.Marker({
    position: [d.origin.lng, d.origin.lat],
    content: '<div style="background:#27ae60;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.3)"></div>',
    offset: new AMap.Pixel(-7, -7), title: d.origin.name
  });
  originMarker.setMap(map);
  tripMarkers.push(originMarker);
  
  var destMarker = new AMap.Marker({
    position: [d.destination.lng, d.destination.lat],
    content: '<div style="background:#c0392b;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.3)"></div>',
    offset: new AMap.Pixel(-7, -7), title: d.destination.name
  });
  destMarker.setMap(map);
  tripMarkers.push(destMarker);
  
  // Show itinerary list
  showTripDays(d);
}
function showTripDays(d) {
  var html = '<div style="padding:4px 0">';
  html += '<div style="font-size:13px;color:#333;margin-bottom:6px">路线: ' + d.origin.name + ' → ' + d.destination.name + '</div>';
  html += '<div style="font-size:11px;color:#888;margin-bottom:8px">' + d.route.distance_text + ' · ' + d.route.duration_text + ' · 共' + d.total_pois + '个沿途点</div>';
  d.days.forEach(function(day){
    html += '<div style="font-size:12px;font-weight:700;color:#c0392b;margin:6px 0 3px;padding:2px 0;border-bottom:1px solid #eee">' + day.title + '</div>';
    day.pois.forEach(function(p){
      var tag = p.type === "food" ? "食" : (p.rating || "景");
      var cls = p.type === "food" ? "f" : "s";
      html += '<div class="item" onclick="flyTo(' + p.lat + ',' + p.lng + ')">';
      html += '<div class="dot ' + cls + '"></div>';
      html += '<div class="info"><div class="name">' + esc(p.name) + '</div>';
      html += '<div class="sub">' + esc(p.city || "") + ' · ' + esc(p.description || "") + '</div></div>';
      html += '<div class="tag ' + cls + '">' + esc(tag) + '</div></div>';
    });
    if (day.pois.length === 0) html += '<div style="font-size:11px;color:#999;padding:2px 8px">该段暂无标注点</div>';
  });
  html += '</div>';
  document.getElementById("list").innerHTML = html;
}
window.addEventListener("resize",function(){
    // Collapse panel on mobile when window resizes
    if(isMobile() && !panel.classList.contains("collapsed")) {
      panel.classList.add("collapsed");
    }
  });
// Handle orientation change on mobile
window.addEventListener("orientationchange",function(){
  setTimeout(function(){
    if(isMobile() && !panel.classList.contains("collapsed")) {
      panel.classList.add("collapsed");
    }
    // Re-render map to fix potential rendering issues after orientation change
    if(map) map.resize();
  }, 200);
});
</script>
